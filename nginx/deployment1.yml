kind: Deployment
apiVersion: apps/v1

metadata:
  name: nginx-deployment
  namespace: nginx

spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx1

  template:
    metadata:
      name: nginx-dep-pod
      labels:
        app: nginx1

    spec:
      containers:
      - name: nginx1
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /var/www/html
          name: my-volume

      volumes:
        - name: my-volume
          persistentVolumeClaim:
            claimName: local-pvc
